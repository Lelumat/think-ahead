<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Think Ahead</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #12121a;
  color: #cccccc;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Login screen ── */
#login-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}
#login-screen h1 {
  font-size: 2rem;
  color: #eeeeee;
  letter-spacing: 0.04em;
}
#login-screen h2 {
  font-size: 1rem;
  color: #888;
  font-weight: normal;
}
#player-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  max-width: 440px;
}
.player-btn {
  background: #1e1e2e;
  color: #aaaaaa;
  border: 1px solid #333344;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.player-btn:hover {
  background: #2a2a40;
  color: #ffffff;
  border-color: #555566;
}
#login-divider { color: #444; font-size: 0.8rem; }
#new-player-form { display: flex; gap: 8px; }
#player-name-input {
  background: #1e1e2e;
  color: #eeeeee;
  border: 1px solid #444455;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.9rem;
  outline: none;
  width: 180px;
}
#player-name-input:focus { border-color: #6688cc; }
#new-player-btn {
  background: #2a3a5a;
  color: #aaddff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.12s;
}
#new-player-btn:hover { background: #3a4a6a; }

/* ── Level select ── */
#level-select {
  flex: 1;
  display: none;
  flex-direction: column;
}
#player-bar {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: #1a1a24;
  border-bottom: 1px solid #2a2a3a;
  flex-shrink: 0;
}
#player-name-display { color: #888; font-size: 0.85rem; }
#player-name-display strong { color: #ccddff; }
#player-bar-actions { display: flex; gap: 8px; }
.bar-btn {
  background: #25253a;
  color: #999;
  border: 1px solid #333;
  padding: 4px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: color 0.12s;
}
.bar-btn:hover { color: #fff; }
#level-select-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 3vw, 28px);
  padding: 10px;
  overflow-y: auto;
}
#level-select-content h1 {
  font-size: clamp(1.3rem, 5vw, 2rem);
  color: #eeeeee;
  letter-spacing: 0.04em;
}
#level-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: clamp(4px, 1.5vw, 10px);
  width: min(420px, 90vw);
}
.lvl-btn {
  width: 100%;
  aspect-ratio: 1;
  background: #1e1e2e;
  color: #aaaaaa;
  border: 1px solid #333344;
  border-radius: 8px;
  font-size: clamp(0.65rem, 2.8vw, 1rem);
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.lvl-btn:hover {
  background: #2a2a40;
  color: #ffffff;
  border-color: #555566;
}
.lvl-btn.solved { border-color: #7a5c00; color: #FFD700; }
.lvl-btn.solved .lvl-check { font-size: 0.65em; color: #B8860B; line-height: 1; }

/* ── Game ── */
#game-container {
  flex: 1;
  display: none;
  flex-direction: column;
}
#hud {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 20px;
  background: #1a1a24;
  flex-shrink: 0;
  border-bottom: 1px solid #2a2a3a;
}
#back-btn {
  background: #25253a;
  color: #999;
  border: 1px solid #333;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.875rem;
}
#back-btn:hover { color: #fff; }
#level-label { color: #888; font-size: 0.9rem; }
#hud-actions { margin-left: auto; display: flex; gap: 8px; }
.hud-btn {
  background: #25253a;
  color: #999;
  border: 1px solid #333;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
}
.hud-btn:hover { color: #fff; }
#canvas-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#canvas { display: block; }

/* ── Win overlay ── */
#win-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1e1e2e;
  border: 1px solid #44445a;
  border-radius: 12px;
  padding: 28px 36px;
  text-align: center;
  min-width: 260px;
  flex-direction: column;
  gap: 10px;
  display: none;
}
#win-overlay.visible { display: flex; }
#win-overlay p { font-size: 1.2rem; color: #eeeeee; margin-bottom: 6px; }
.win-btn {
  padding: 10px 20px;
  background: #2a3a5a;
  color: #aaddff;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.12s;
}
.win-btn:hover { background: #3a4a6a; }

/* ── Leaderboard overlay ── */
#leaderboard-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
#leaderboard-overlay.visible { display: flex; }
#leaderboard-panel {
  background: #1e1e2e;
  border: 1px solid #44445a;
  border-radius: 12px;
  padding: 28px 36px;
  min-width: 300px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
}
#leaderboard-panel h2 {
  color: #eee;
  margin-bottom: 20px;
  font-size: 1.25rem;
  text-align: center;
  letter-spacing: 0.04em;
}
#leaderboard-list {
  list-style: none;
  margin-bottom: 20px;
}
#leaderboard-list li {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #2a2a3a;
  font-size: 0.95rem;
  color: #ccc;
  gap: 8px;
}
#leaderboard-list li:last-child { border-bottom: none; }
.lb-rank { width: 28px; color: #555; font-size: 0.8rem; }
.lb-name { flex: 1; }
.lb-name.me { color: #aaddff; font-weight: bold; }
.lb-score { color: #FFD700; font-size: 0.9rem; }
#close-leaderboard {
  display: block;
  margin: 0 auto;
  background: #25253a;
  color: #999;
  border: 1px solid #333;
  padding: 8px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: color 0.12s;
}
#close-leaderboard:hover { color: #fff; }
</style>
</head>
<body>

<!-- ── Login screen ── -->
<div id="login-screen">
  <h1>Think Ahead</h1>
  <h2>Who's playing?</h2>
  <div id="player-list"></div>
  <div id="login-divider" style="display:none">— or enter a new name —</div>
  <div id="new-player-form">
    <input type="text" id="player-name-input" placeholder="Your name..." maxlength="20" autocomplete="off" spellcheck="false">
    <button id="new-player-btn">Play</button>
  </div>
</div>

<!-- ── Level select ── -->
<div id="level-select">
  <div id="player-bar">
    <span id="player-name-display">Playing as <strong id="current-player-label"></strong></span>
    <div id="player-bar-actions">
      <button class="bar-btn" id="leaderboard-btn">Leaderboard</button>
      <button class="bar-btn" id="change-player-btn">Change</button>
    </div>
  </div>
  <div id="level-select-content">
    <h1>Think Ahead</h1>
    <div id="level-grid"></div>
  </div>
</div>

<!-- ── Game ── -->
<div id="game-container">
  <div id="hud">
    <button id="back-btn">&#8592; Levels</button>
    <span id="level-label"></span>
    <div id="hud-actions">
      <button class="hud-btn" id="undo-btn" title="Undo (Z)">&#8617;</button>
      <button class="hud-btn" id="reset-btn" title="Reset (R)">&#8635;</button>
    </div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
    <div id="win-overlay">
      <p>All nodes collected!</p>
      <button class="win-btn" id="next-btn">Next Level &#8594;</button>
      <button class="win-btn" id="menu-btn">Level Select</button>
    </div>
  </div>
</div>

<!-- ── Leaderboard overlay ── -->
<div id="leaderboard-overlay">
  <div id="leaderboard-panel">
    <h2>Leaderboard</h2>
    <ul id="leaderboard-list"></ul>
    <button id="close-leaderboard">Close</button>
  </div>
</div>

-   |   -   -   -   -   -   -   -
O | O - O - O | * | O - O - O | O
|   -   |   -   -   -   -   -   -
O - * - O - O | O - O - O - O - O`,
];

// ─── Parser (port of level_loader.gd _parse) ─────────────────────────────────

function parseLevel(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
  if (lines.length === 0) return null;

  let maxLen = 0;
  for (let i = 0; i < lines.length; i += 2) maxLen = Math.max(maxLen, lines[i].length);
  const cols = Math.floor((maxLen + 3) / 4);
  const rows = Math.floor((lines.length + 1) / 2);

  const grid = [], hConn = [], vConn = [];

  for (let r = 0; r < rows; r++) {
    const nline = r * 2 < lines.length ? lines[r * 2] : '';
    const grow = [], hrow = [];

    for (let c = 0; c < cols; c++) {
      const np = c * 4;
      const ch = np < nline.length ? nline[np] : 'O';
      grow.push({ start: ch === 'ò', colored: ch === '*' });
      if (c < cols - 1) {
        const hp = c * 4 + 2;
        hrow.push(hp < nline.length ? nline[hp] === '-' : false);
      }
    }

    grid.push(grow);
    hConn.push(hrow);

    if (r < rows - 1) {
      const cline = r * 2 + 1 < lines.length ? lines[r * 2 + 1] : '';
      const vrow = [];
      for (let c = 0; c < cols; c++) {
        const vp = c * 4;
        vrow.push(vp < cline.length ? cline[vp] === '-' : false);
      }
      vConn.push(vrow);
    }
  }

  return rotate90CW({ cols, rows, grid, hConn, vConn });
}

function rotate90CW(lv) {
  const R = lv.rows, C = lv.cols;
  // new grid[i][j] = old grid[R-1-j][i]
  const newGrid = [];
  for (let i = 0; i < C; i++) {
    const row = [];
    for (let j = 0; j < R; j++) row.push(lv.grid[R-1-j][i]);
    newGrid.push(row);
  }
  // new hConn[i][j] = old vConn[R-2-j][i]  (horizontal ↔ vertical after rotation)
  const newHConn = [];
  for (let i = 0; i < C; i++) {
    const row = [];
    for (let j = 0; j < R-1; j++) row.push(lv.vConn[R-2-j][i]);
    newHConn.push(row);
  }
  // new vConn[i][j] = old hConn[R-1-j][i]
  const newVConn = [];
  for (let i = 0; i < C-1; i++) {
    const row = [];
    for (let j = 0; j < R; j++) row.push(lv.hConn[R-1-j][i]);
    newVConn.push(row);
  }
  return { cols: R, rows: C, grid: newGrid, hConn: newHConn, vConn: newVConn };
}

// ─── Player management ───────────────────────────────────────────────────────

const STORAGE_KEY = 'thinkAheadData';
const COOKIE_NAME = 'thinkAheadPlayer';

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

function getPlayerSolved(name) {
  return loadData()[name] || [];
}

function markLevelSolved(name, idx) {
  const d = loadData();
  if (!d[name]) d[name] = [];
  if (!d[name].includes(idx)) { d[name].push(idx); saveData(d); }
}

function getAllPlayers() {
  return Object.entries(loadData())
    .map(([name, solved]) => ({ name, count: solved.length }))
    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
}

function setCookie(k, v, days) {
  const exp = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = `${k}=${encodeURIComponent(v)};expires=${exp};path=/;SameSite=Lax`;
}

function getCookie(k) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + k + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ─── State ───────────────────────────────────────────────────────────────────

let currentPlayer = '';
let currentIndex = 0;
let level = null;
let path = [];
let coloredTotal = 0;
let completed = false;

// ─── Helpers ─────────────────────────────────────────────────────────────────

function pathHas(x, y) {
  for (const p of path) if (p.x === x && p.y === y) return true;
  return false;
}

function hasConnection(ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  if (dx === 1  && dy === 0) return level.hConn[ay][ax];
  if (dx === -1 && dy === 0) return level.hConn[ay][bx];
  if (dx === 0  && dy === 1) return level.vConn[ay][ax];
  if (dx === 0  && dy === -1) return level.vConn[by][ax];
  return false;
}

function collectedCount() {
  let n = 0;
  for (const p of path) if (level.grid[p.y][p.x].colored) n++;
  return n;
}

// ─── Game logic ──────────────────────────────────────────────────────────────

function tryMove(dx, dy) {
  if (path.length === 0 || completed) return;
  const cur = path[path.length - 1];
  const nx = cur.x + dx, ny = cur.y + dy;
  if (nx < 0 || nx >= level.cols || ny < 0 || ny >= level.rows) return;
  if (!hasConnection(cur.x, cur.y, nx, ny)) return;
  if (path.length > 1) {
    const prev = path[path.length - 2];
    if (nx === prev.x && ny === prev.y) { doUndo(); return; }
  }
  if (pathHas(nx, ny)) return;
  path.push({ x: nx, y: ny });
  render();
  checkWin();
}

function doUndo() {
  if (path.length > 1) { path.pop(); render(); }
}

function doReset() {
  while (path.length > 1) path.pop();
  completed = false;
  document.getElementById('win-overlay').classList.remove('visible');
  render();
}

function checkWin() {
  if (coloredTotal === 0 || completed) return;
  if (collectedCount() === coloredTotal) {
    completed = true;
    if (currentPlayer) markLevelSolved(currentPlayer, currentIndex);
    document.getElementById('win-overlay').classList.add('visible');
  }
}

// ─── Rendering ───────────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const NODE_R = 18;
const GEM_FILL    = 'rgb(242,38,38)';
const GEM_VISITED = 'rgb(245,92,92)';

function cellSize() {
  const csW = (canvas.width  - 80)  / Math.max(level.cols - 1, 1);
  const csH = (canvas.height - 120) / Math.max(level.rows - 1, 1);
  return Math.min(140, Math.min(csW, csH));
}

function margin(cs) {
  return {
    x: (canvas.width  - (level.cols - 1) * cs) / 2,
    y: (canvas.height - (level.rows - 1) * cs) / 2 + 20,
  };
}

function render() {
  if (!level) return;

  const wrapper = document.getElementById('canvas-wrapper');
  canvas.width  = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;

  const cs = cellSize();
  const mg = margin(cs);
  const edgeW  = Math.max(6, cs * 0.09);
  const trailW = Math.min(18, cs * 0.18);

  ctx.fillStyle = '#12121a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#8c8ca6';
  ctx.lineWidth = edgeW;
  ctx.lineCap = 'round';
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const px = mg.x + c * cs, py = mg.y + r * cs;
      if (c + 1 < level.cols && level.hConn[r][c]) {
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(mg.x + (c + 1) * cs, py); ctx.stroke();
      }
      if (r + 1 < level.rows && level.vConn[r][c]) {
        ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, mg.y + (r + 1) * cs); ctx.stroke();
      }
    }
  }

  if (path.length > 1) {
    ctx.strokeStyle = 'rgba(89,166,255,0.85)';
    ctx.lineWidth = trailW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(mg.x + path[0].x * cs, mg.y + path[0].y * cs);
    for (let i = 1; i < path.length; i++) {
      ctx.lineTo(mg.x + path[i].x * cs, mg.y + path[i].y * cs);
    }
    ctx.stroke();
  }

  const cur = path.length > 0 ? path[path.length - 1] : null;
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const cell = level.grid[r][c];
      const px = mg.x + c * cs, py = mg.y + r * cs;
      const visited   = pathHas(c, r);
      const isCurrent = cur && cur.x === c && cur.y === r;

      let fill;
      if      (cell.start)              fill = visited ? '#40bf40' : '#268c26';
      else if (cell.colored && visited) fill = GEM_VISITED;
      else if (cell.colored)            fill = GEM_FILL;
      else if (visited)                 fill = '#4073b3';
      else                              fill = '#333340';

      ctx.beginPath(); ctx.arc(px, py, NODE_R, 0, Math.PI * 2);
      ctx.fillStyle = fill; ctx.fill();

      ctx.beginPath(); ctx.arc(px, py, NODE_R, 0, Math.PI * 2);
      ctx.strokeStyle = '#a6a6a6'; ctx.lineWidth = 1.5; ctx.stroke();

      if (isCurrent) {
        ctx.beginPath(); ctx.arc(px, py, NODE_R + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3; ctx.stroke();
      }
    }
  }

  ctx.fillStyle = '#cccccc';
  ctx.font = '16px system-ui, sans-serif';
  ctx.fillText(`${collectedCount()} / ${coloredTotal} collected`, 20, 50);

  ctx.fillStyle = '#737373';
  ctx.font = '13px system-ui, sans-serif';
  ctx.fillText('WASD / Arrows: move     Z / Backspace: undo     R: restart', 20, canvas.height - 22);
  ctx.fillText('Touch: drag from current node to move', 20, canvas.height - 6);
}

// ─── Screen management ───────────────────────────────────────────────────────

function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-container').style.display = 'none';
  buildPlayerList();
  document.getElementById('player-name-input').value = '';
}

function showLevelSelect() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'flex';
  document.getElementById('game-container').style.display = 'none';
  buildLevelGrid();
}

function showGame() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('level-select').style.display = 'none';
  document.getElementById('game-container').style.display = 'flex';
}

function buildPlayerList() {
  const d = loadData();
  const names = Object.keys(d).sort();
  const list = document.getElementById('player-list');
  const divider = document.getElementById('login-divider');
  list.innerHTML = '';
  if (names.length > 0) {
    divider.style.display = '';
    for (const name of names) {
      const btn = document.createElement('button');
      btn.className = 'player-btn';
      const count = (d[name] || []).length;
      btn.textContent = `${name}  (${count} / ${LEVELS.length})`;
      btn.addEventListener('click', () => setPlayer(name));
      list.appendChild(btn);
    }
  } else {
    divider.style.display = 'none';
  }
}

function setPlayer(name) {
  name = name.trim();
  if (!name) return;
  currentPlayer = name;
  setCookie(COOKIE_NAME, name, 30);
  const d = loadData();
  if (!d[name]) { d[name] = []; saveData(d); }
  document.getElementById('current-player-label').textContent = name;
  showLevelSelect();
}

function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  const solved = getPlayerSolved(currentPlayer);
  for (let i = 0; i < LEVELS.length; i++) {
    const btn = document.createElement('button');
    const isSolved = solved.includes(i);
    btn.className = 'lvl-btn' + (isSolved ? ' solved' : '');
    btn.innerHTML = `<span>${i + 1}</span>${isSolved ? '<span class="lvl-check">✓</span>' : ''}`;
    btn.addEventListener('click', () => initLevel(i));
    grid.appendChild(btn);
  }
}

function showLeaderboard() {
  const players = getAllPlayers();
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';
  if (players.length === 0) {
    const li = document.createElement('li');
    li.innerHTML = '<span style="color:#555;font-size:0.9rem">No players yet</span>';
    list.appendChild(li);
  } else {
    players.forEach(({ name, count }, i) => {
      const li = document.createElement('li');
      const isMe = name === currentPlayer;
      li.innerHTML = `<span class="lb-rank">${i + 1}.</span><span class="lb-name${isMe ? ' me' : ''}">${escHtml(name)}</span><span class="lb-score">${count} / ${LEVELS.length}</span>`;
      list.appendChild(li);
    });
  }
  document.getElementById('leaderboard-overlay').classList.add('visible');
}

function initLevel(index) {
  currentIndex = index;
  level = parseLevel(LEVELS[index]);
  path = [];
  coloredTotal = 0;
  completed = false;
  document.getElementById('win-overlay').classList.remove('visible');

  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const cell = level.grid[r][c];
      if (cell.colored) coloredTotal++;
      if (cell.start) path.push({ x: c, y: r });
    }
  }

  document.getElementById('level-label').textContent = `Level ${index + 1}`;
  document.getElementById('next-btn').style.display =
    index + 1 < LEVELS.length ? 'block' : 'none';

  showGame();
  render();
}

// ─── Touch / drag / click input ──────────────────────────────────────────────

let dragging = false;
let dragLastNode = null;

function clientToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function posToNearestNode(cx, cy) {
  if (!level) return null;
  const cs = cellSize();
  const mg = margin(cs);
  const threshold = cs * 0.5;
  let best = null, bestDist = threshold;
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const d = Math.hypot(cx - (mg.x + c * cs), cy - (mg.y + r * cs));
      if (d < bestDist) { bestDist = d; best = { x: c, y: r }; }
    }
  }
  return best;
}

function handleTap(clientX, clientY) {
  if (!level || completed || path.length === 0) return;
  const { x, y } = clientToCanvas(clientX, clientY);
  const cs   = cellSize();
  const mg   = margin(cs);
  const hitR = Math.max(NODE_R + 10, cs * 0.38);
  for (let r = 0; r < level.rows; r++) {
    for (let c = 0; c < level.cols; c++) {
      const px = mg.x + c * cs, py = mg.y + r * cs;
      if ((x - px) ** 2 + (y - py) ** 2 <= hitR * hitR) {
        const cur = path[path.length - 1];
        const dx = c - cur.x, dy = r - cur.y;
        if (Math.abs(dx) + Math.abs(dy) === 1) tryMove(dx, dy);
        return;
      }
    }
  }
}

function startDrag(clientX, clientY) {
  if (!level || completed || path.length === 0) return false;
  const { x, y } = clientToCanvas(clientX, clientY);
  const node = posToNearestNode(x, y);
  const cur  = path[path.length - 1];
  if (node && node.x === cur.x && node.y === cur.y) {
    dragging = true;
    dragLastNode = node;
    return true;
  }
  return false;
}

function continueDrag(clientX, clientY) {
  if (!dragging || !level || completed) return;
  const { x, y } = clientToCanvas(clientX, clientY);
  const node = posToNearestNode(x, y);
  if (!node) return;
  if (dragLastNode && node.x === dragLastNode.x && node.y === dragLastNode.y) return;
  const cur = path[path.length - 1];
  const dx = node.x - cur.x, dy = node.y - cur.y;
  if (Math.abs(dx) + Math.abs(dy) === 1) tryMove(dx, dy);
  dragLastNode = node;
}

function endDrag() { dragging = false; dragLastNode = null; }

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (!startDrag(t.clientX, t.clientY)) handleTap(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  continueDrag(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); endDrag(); }, { passive: false });

canvas.addEventListener('mousedown', e => { if (e.button === 0) startDrag(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', e => { if (e.buttons & 1) continueDrag(e.clientX, e.clientY); });
canvas.addEventListener('mouseup',   () => endDrag());
canvas.addEventListener('click',     e => handleTap(e.clientX, e.clientY));

// ─── Keyboard input ──────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (document.getElementById('game-container').style.display === 'none') return;
  switch (e.key) {
    case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); tryMove(0, -1);  break;
    case 'ArrowDown':  case 's': case 'S': e.preventDefault(); tryMove(0,  1);  break;
    case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); tryMove(-1, 0);  break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); tryMove(1,  0);  break;
    case 'z': case 'Z': case 'Backspace':                       doUndo();        break;
    case 'r': case 'R':                                         doReset();       break;
  }
});

window.addEventListener('resize', () => { if (level) render(); });

// ─── UI wiring ───────────────────────────────────────────────────────────────

document.getElementById('undo-btn').addEventListener('click', doUndo);
document.getElementById('reset-btn').addEventListener('click', doReset);

document.getElementById('back-btn').addEventListener('click', () => {
  showLevelSelect();
  level = null;
});

document.getElementById('next-btn').addEventListener('click', () => {
  initLevel(currentIndex + 1);
});

document.getElementById('menu-btn').addEventListener('click', () => {
  showLevelSelect();
  level = null;
});

document.getElementById('leaderboard-btn').addEventListener('click', showLeaderboard);
document.getElementById('change-player-btn').addEventListener('click', showLoginScreen);
document.getElementById('close-leaderboard').addEventListener('click', () => {
  document.getElementById('leaderboard-overlay').classList.remove('visible');
});
document.getElementById('leaderboard-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('leaderboard-overlay'))
    document.getElementById('leaderboard-overlay').classList.remove('visible');
});

document.getElementById('new-player-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name-input').value.trim();
  if (name) setPlayer(name);
});

document.getElementById('player-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const name = document.getElementById('player-name-input').value.trim();
    if (name) setPlayer(name);
  }
});

// ─── Init ────────────────────────────────────────────────────────────────────

(function init() {
  const saved = getCookie(COOKIE_NAME);
  if (saved) {
    const d = loadData();
    if (d[saved] !== undefined) {
      currentPlayer = saved;
      document.getElementById('current-player-label').textContent = saved;
      showLevelSelect();
      return;
    }
  }
  showLoginScreen();
})();
</script>
